<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>Alchemist</title>

<style>
:root{--bg:#0b0907;--sf:#151210;--s2:#1e1a16;--s3:#272219;--ac:#c9a227;--ag:#c9a22744;--al:#e8c547;--tx:#f0ece4;--tm:#8a8279;--td:#5a554e;--dg:#b34040;--ok:#5a9a5a;--bd:#2a2520;--r:8px;--rl:16px;--fd:'Playfair Display','Noto Serif SC',serif;--fb:'Noto Serif SC','Playfair Display',serif;--fm:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--s3) var(--bg)}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.7;font-weight:300}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 20%,#1a0f05,transparent 50%),radial-gradient(ellipse at 85% 80%,#0f0a14,transparent 50%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 24px}
header{padding:52px 0 32px;text-align:center}
header::after{content:'';display:block;width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--ac),transparent);margin:24px auto 0}
.logo-g{display:inline-block;margin-bottom:10px;animation:fl 4s ease-in-out infinite;cursor:pointer;transition:filter .3s,transform .3s}
.logo-g:hover{filter:drop-shadow(0 0 12px rgba(201,162,39,.5));transform:translateY(-6px) scale(1.05)}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
h1{font-family:var(--fd);font-weight:900;font-size:clamp(1.7rem,5vw,2.8rem);letter-spacing:.08em;text-transform:uppercase}

.sub{font-family:var(--fm);font-size:.76rem;color:var(--tm);letter-spacing:.3em;text-transform:uppercase;margin-top:6px}
.tbar{display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap}

.ba{display:flex;align-items:center;gap:8px;padding:11px 22px;background:var(--ac);color:var(--bg);border:none;border-radius:var(--r);font-family:var(--fd);font-weight:600;font-size:.92rem;cursor:pointer;transition:all .25s;white-space:nowrap}

.btn-m.on{border-color:var(--ac);color:var(--ac);background:rgba(201,162,39,.08)}

.ct{display:flex;align-items:center;gap:6px;padding:9px 18px;background:var(--sf);border:1px solid var(--bd);border-radius:100px;color:var(--tm);font-family:var(--fb);font-size:.84rem;cursor:pointer;white-space:nowrap;transition:all .25s;flex-shrink:0}

@keyframes fadeUp{from{opacity:0}to{opacity:1}}

.pf-edit{background:none;border:1px solid var(--bd);border-radius:var(--r);color:var(--tm);font-family:var(--fm);font-size:.72rem;cursor:pointer;padding:5px 12px;transition:all .2s;white-space:nowrap}

.pf-reset:hover{color:var(--dg);background:rgba(179,64,64,.08)}

.cd{display:flex;flex-direction:column;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:26px 26px 0;cursor:pointer;position:relative;overflow:hidden;opacity:0;animation:ci .5s ease forwards;transition:all .35s cubic-bezier(.25,.46,.45,.94)}

.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ===== 自动检测引擎 ===== */
var _UNITS='ml|cl|dl|l|oz|dash|dashes|drop|滴|片|颗|个|根|块|瓣|吧勺|茶匙|汤匙|杯|份|tsp|tbsp|teaspoon|tablespoon|pony|splash|part|parts|shot|shots|pinch';
var _QRE=new RegExp('\\d+\\.?\\d*(?:\\s*[-~至]\\s*\\d+\\.?\\d*)?\\s*('+_UNITS+')(?![A-Za-z0-9])','i');

var _VERBS_CN='倒入|加入|搅拌|摇匀|摇动|摇|装饰|放入|捣压|过滤|注入|润湿|混合|冰镇|点燃|挤出|切|磨|撒|淋|浮|调制|轻搅|缓慢|装满|双重过滤|干摇|加冰|放冰|挤油|抹盐|抹糖|沿杯壁|搅拌溶解|取出|铺上|放上|放置|缓缓|将|然后|接着|最后|再|制作|依次|所有|缓慢地|轻轻地';
var _VERBS_RE=new RegExp('^('+_VERBS_CN+'|muddle|stir|shake|pour|mix|strain|garnish|fill|add|combine|blend|rim|squeeze|top|build|layer|float|flame|chill|serve|swizzle|roll|throw)','i');
var _VERBS_CONTAINS=new RegExp(_VERBS_CN);

function _siAutoDetect(text){
  text=text.trim().replace(/$$citation:\s*\d+$$/gi,'').replace(/$$\d+$$/g,'');
  if(!text)return{format:'empty',recipes:[]};
  /* JSON */
  try{var d=JSON.parse(text);var arr=d.cocktails||(Array.isArray(d)?d:null);if(arr&&Array.isArray(arr))return{format:'json',recipes:arr.map(_normRecipe).filter(Boolean)}}catch(e){}
  /* CSV */
  var fl=text.split('\n')[0]||'';
  if((fl.match(/,/g)||[]).length>=3||(fl.match(/\t/g)||[]).length>=3){
    try{var cr=_parseCSV(text);if(cr.length>0)return{format:'csv',recipes:cr}}catch(e){}
  }
  /* Freeform */
  return{format:'freeform',recipes:_parseFreeform(text)};
}

function _normRecipe(c){
  if(!c||!c.name)return null;
  return{
    id:c.id||_genId(),name:c.name||'',nameEn:c.nameEn||c.name_en||'',
    g:c.g||c.glass||'old-fashioned',cat:c.cat||c.category||'classic',
    str:_nStr(c.str||c.strength||'medium'),desc:c.desc||c.description||'',
    base:c.base||'',
    ing:(c.ing||c.ingredients||[]).map(function(i){return{n:i.n||i.name||'',a:i.a||i.amount||''}}).filter(function(i){return i.n}),
    stp:c.stp||c.steps||[],tags:Array.isArray(c.tags)?c.tags:[]
  };
}

/* CSV */
function _parseCSV(text){
  var lines=_csvLines(text.trim());
  if(lines.length<2)return[];
  var h=lines[0].map(function(x){return x.trim()});
  var r=[];
  for(var i=1;i<lines.length;i++){
    var row=lines[i];
    if(!row||(row.length===1&&!row[0].trim()))continue;
    var obj={};
    h.forEach(function(k,idx){obj[k]=(row[idx]||'').trim()});
    var rc=_csvRow(obj);
    if(rc)r.push(rc);
  }
  return r;
}

function _csvLines(text){
  var lines=[],cur=[],field='',inQ=false;
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(inQ){
      if(ch==='"'&&text[i+1]==='"'){field+='"';i++}
      else if(ch==='"'){inQ=false}
      else{field+=ch}
    }else{
      if(ch==='"'){inQ=true}
      else if(ch===','){cur.push(field);field=''}
      else if(ch==='\n'||(ch==='\r'&&text[i+1]==='\n')){
        cur.push(field);field='';lines.push(cur);cur=[];
        if(ch==='\r')i++;
      }else{field+=ch}
    }
  }
  cur.push(field);
  if(cur.some(function(f){return f.trim()}))lines.push(cur);
  return lines;
}

function _csvRow(o){
  var n=o['中文名称']||o['名称']||o['name']||'';
  if(!n)return null;
  var ne=o['英文名称']||o['nameEn']||'';
  var ir=o['配料']||o['ingredients']||'';
  var ing=[];
  if(ir)ir.split(/[;；]/).forEach(function(s){s=s.trim();if(!s)return;var p=s.split(/[:：]/);ing.push({n:p[0].trim(),a:p.slice(1).join(':').trim()})});
  var sr=o['步骤']||o['steps']||'';
  var stp=[];
  if(sr)sr.split(/[;；]/).forEach(function(s){s=s.trim().replace(/^\d+[\.\、\)\.]\s*/,'');if(s)stp.push(s)});
  var tr=o['标签']||o['tags']||'';
  var tags=[];
  if(tr)tr.split(/[;；,，\/]/).forEach(function(t){t=t.trim();if(t)tags.push(t)});
  return{id:_genId(),name:n,nameEn:ne,g:_nGlass(o['杯型']||o['glass']||''),cat:_nCat(o['分类']||o['category']||''),str:_nStr(o['烈度']||o['strength']||''),desc:o['简介']||o['description']||'',base:o['基酒']||o['base']||'',ing:ing,stp:stp,tags:tags};
}

/* 归一化 */
var _STR_MAP={'轻度':'light','中度':'medium','强烈':'strong','低度':'light','高度':'strong','烈':'strong','mild':'light','boozy':'strong'};
var _CAT_MAP={'经典':'classic','酸酒':'sour','嗨棒':'highball','马天尼':'martini','曼哈顿':'manhattan','菲士':'fizz','司令':'sling','菲力帕':'flip','托蒂':'toddy','潘趣':'punch','提基':'tiki'};
var _GLASS_MAP={'古典杯':'old-fashioned','高球杯':'highball','柯林杯':'collins','鸡尾酒杯':'coupe','马天尼杯':'martini','飓风杯':'hurricane','玛格丽特杯':'margarita','格兰凯恩':'glencairn','尼克诺拉杯':'nick-nora','红酒杯':'wine','烈酒杯':'shot','皮尔森杯':'pilsner','铜杯':'copper-mug','僵尸杯':'zombie','平底杯':'tumbler','笛形杯':'flute','白兰地杯':'snifter','啤酒杯':'mug'};

function _nStr(s){s=(s||'').toLowerCase();return _STR_MAP[s]||(['light','medium','strong'].indexOf(s)>=0?s:'medium')}
function _nCat(s){s=s.trim();return _CAT_MAP[s]||s||'classic'}
function _nGlass(s){s=s.trim();return _GLASS_MAP[s]||s||'old-fashioned'}
function _genId(){return 'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}

/* ===== 自由文本解析器 ===== */
function _parseFreeform(text){
  var allLines=text.split('\n');
  var starts=[];
  for(var i=0;i<allLines.length;i++){
    if(_isRecipeName(allLines[i].trim()))starts.push(i);
  }
  if(starts.length===0){
    var r=_parseOne(allLines);
    return r&&r.name?[r]:[];
  }
  var recipes=[];
  for(var b=0;b<starts.length;b++){
    var s=starts[b];
    var e=(b+1<starts.length)?starts[b+1]:allLines.length;
    var r=_parseOne(allLines.slice(s,e));
    if(r&&r.name)recipes.push(r);
  }
  return recipes;
}

function _isRecipeName(line){
  if(!line||line.length<2||line.length>60)return false;
  if(/^(分类|类别|烈度|杯型|基酒|标签|步骤|材料|配料|描述|说明|简介)[：:]/i.test(line))return false;
  if(/^【/.test(line))return false;
  if(/^\d+[\.\、]/.test(line))return false;
  if(/^[─\-═━]{3,}\s*$/.test(line))return false;
  if(_QRE.test(line))return false;
  if(/适量|少许/.test(line))return false;
  if(_VERBS_CONTAINS.test(line))return false;
  if(/杯|壶/.test(line))return false;
  if(line.includes('。'))return false;
  if(line.includes('，')&&line.length>15)return false;
  var hasCJK=/[\u4e00-\u9fa5]/.test(line);
  var hasLat=/[A-Za-z]{2,}/.test(line);
  if(!hasCJK&&!hasLat)return false;

  /* 含斜杠的行：判断是配方名还是元数据 */
  if(line.indexOf('/')>=0||line.indexOf('／')>=0){
    var parts=line.split(/[/／]/);
    var left=parts[0].trim();
    var right=parts[1]?parts[1].trim():'';

    /* 排除杯型行 */
    if(/杯|壶|coupe|highball|collins|martini|hurricane|shot|wine|pilsner|mug|zombie|glencairn|rocks|flute|snifter|tumbler|copper|nick\s*&?\s*nora/i.test(line))return false;

    /* 排除强度词 */
    if(/^(light|medium|strong|淡|中|烈|轻|低|强|高)$/i.test(right))return false;

    /* 排除分类名 */
    var catWords=['酸酒','经典','高球','马天尼','曼哈顿','菲士','司令','翻转','托蒂','潘趣','提基',
                  'sour','classic','highball','martini','manhattan','fizz','sling','flip','toddy','punch','tiki'];
    for(var i=0;i<catWords.length;i++){
      if(left===catWords[i]||right===catWords[i])return false;
    }

    /* 排除现有分类名称 */
    for(var j=0;j<CATS.length;j++){
      if(left===CATS[j].name)return false;
    }

    return true;
  }

  if(hasCJK&&hasLat)return true;
  if(hasCJK&&!hasLat&&line.length<=8)return true;
  if(hasLat&&!hasCJK&&/^[A-Z]/.test(line)&&line.length<=40&&!line.includes(':')&&!line.includes('：'))return true;
  return false;
}

function _parseOne(lines){
  var R={id:_genId(),name:'',nameEn:'',g:'old-fashioned',cat:'classic',str:'medium',desc:'',base:'',ing:[],stp:[],tags:[]};
  var sec='auto',descL=[],nameIdx=-1;
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line||line==='。'||line==='.')continue;
    if(/^[─\-═━]{3,}\s*$/.test(line))continue;

    /* 段落标记 */
    var sm=line.match(/^【\s*(.+?)\s*】/);
    if(sm){
      var sn=sm[1];
      if(/材料|配料|ingredients|materials/i.test(sn)){sec='ingredients';continue}
      if(/步骤|做法|制作|instructions|steps|directions|method/i.test(sn)){sec='steps';continue}
      continue;
    }
    /* 不带括号的段落标记 */
    if(/^(材料|配料|ingredients|materials)[：:]/i.test(line)){sec='ingredients';continue}
    if(/^(步骤|做法|制作|instructions|steps|directions|method)[：:]/i.test(line)){sec='steps';continue}

    /* 元数据 */
    var mm=line.match(/^(分类|类别|类型|烈度|酒精度|强度|杯型|杯子|基酒|标签|tags|glass|category|strength|base)[：:]\s*(.+)/i);
    if(mm){
      var k=mm[1].toLowerCase(),v=mm[2].trim();
      if(/分类|类别|类型|category/.test(k))R.cat=_nCat(v);
      else if(/烈度|酒精度|强度|strength/.test(k))R.str=_nStr(v);
      else if(/杯型|杯子|glass/.test(k))R.g=_nGlass(v);
      else if(/基酒|base/.test(k))R.base=v;
      else if(/标签|tags/.test(k)){
        v.split(/[;；,，\/]/).forEach(function(t){t=t.trim();if(t&&R.tags.indexOf(t)<0)R.tags.push(t)});
      }
      continue;
    }

    /* 名称 */
    if(!R.name){
      var t=_extractName(line);
      if(t){R.name=t.name;R.nameEn=t.nameEn||'';nameIdx=i;continue}
    }

    /* 名称之后紧跟的第一行：可能是杯型 */
    if(R.name&&nameIdx>=0&&i===nameIdx+1&&!R._gParsed){
      var gv=_nGlass(line);
      if(gv&&gv!=='old-fashioned'){R.g=gv;R._gParsed=true;continue}
    }

    /* 名称之后紧跟的第二行：可能是分类/强度 */
    if(R.name&&nameIdx>=0&&i===nameIdx+2&&!R._cParsed){
      if(line.indexOf('/')>=0||line.indexOf('／')>=0){
        var sp=line.split(/[/／]/);
        if(sp.length>=2){
          var cv=_nCat(sp[0].trim()),sv=_nStr(sp[1].trim());
          if(cv){R.cat=cv;R._cParsed=true;}
          if(sv){R.str=sv;R._cParsed=true;}
          if(R._cParsed)continue;
        }
      }
    }

    /* 有明确标记的 section */
    if(sec==='ingredients'){var ig=_parseIng(line);if(ig){R.ing.push(ig);continue}descL.push(line);continue}
    if(sec==='steps'){var st=_parseStep(line);if(st){R.stp.push(st);continue}descL.push(line);continue}

    /* 自动分类 */
    if(/^\d+[\.\、\)]/.test(line)){var st=_parseStep(line);if(st){R.stp.push(st);continue}}
    if(_VERBS_RE.test(line)){var st=_parseStep(line);if(st){R.stp.push(st);continue}}
    if(!_QRE.test(line)){
      if(/(倒入|加入|搅拌|摇匀|装饰|放入|捣压|过滤|注入|润湿|混合|冰镇|点燃|挤出|调制|轻搅|缓慢|装满|双重过滤|干摇|加冰|放冰|挤油|抹盐|抹糖|沿杯壁|搅拌溶解|取出|铺上|放上|放置|缓缓)$/.test(line)){
        R.stp.push(line);continue;
      }
    }
    if(!_QRE.test(line)&&/杯|壶/.test(line)&&!/[\u4e00-\u9fa5]{2,8}酒/.test(line)){
      R.stp.push(line);continue;
    }
    var ig=_parseIng(line);
    if(ig){R.ing.push(ig);continue}
    descL.push(line);
  }
  R.desc=descL.join('\n').replace(/^\s*。\s*$/gm,'').trim();
  if(!R.base&&R.ing.length>0){
    var sp=/朗姆|rum|威士忌|whiskey|whisky|bourbon|波本|金酒|gin|伏特加|vodka|龙舌兰|tequila|白兰地|brandy|干邑|cognac/i;
    for(var j=0;j<R.ing.length;j++){if(sp.test(R.ing[j].n)){R.base=R.ing[j].n;break}}
  }
  return R;
}

function _extractName(line){
  var s=line.replace(/^#{1,3}\s*/,'').replace(/^\d+[\.\、]\s*/,'').trim(),m;
  if((m=s.match(/^[「《【$$](.+?)[」》】$$]$/)))s=m[1].trim();
  var R={name:'',nameEn:''};
  if((m=s.match(/^([\u4e00-\u9fa5·\-]+)\s*[$$（]([A-Za-z][A-Za-z\s&'\-]+)[$$）]$/))){R.name=m[1].trim();R.nameEn=m[2].trim()}
  else if((m=s.match(/^([\u4e00-\u9fa5·\-]+)\s*[/／]\s*([A-Za-z][A-Za-z\s&'\-]+)$/))){R.name=m[1].trim();R.nameEn=m[2].trim()}
  else if((m=s.match(/^([\u4e00-\u9fa5·\-]+)\s+([A-Za-z][A-Za-z\s&'\-]+)$/))){R.name=m[1].trim();R.nameEn=m[2].trim()}
  else if(/^[\u4e00-\u9fa5·\-]+$/.test(s))R.name=s;
  else if(/^[A-Z][a-zA-Z\s&'\-]+$/.test(s))R.name=s;
  else R.name=s;
  return R.name?R:null;
}

function _parseIng(line){
  var s=line.replace(/^[\s]*[·•\-\*]\s*/,'').replace(/^[\s]*\d+[\.\、\)]\s*(?=[^\d])/,'');
  if(!_QRE.test(s)&&!/适量|少许/i.test(s))return null;
  var m;
  if((m=s.match(/^(.+?)\s*[：:]\s*(.+)$/)))return{n:m[1].trim(),a:m[2].trim()};
  var u1='^(.+?)\\s+(\\d+\\.?\\d*(?:\\s*[-~至]\\s*\\d+\\.?\\d*)?\\s*(?:'+_UNITS+'))(?:\\b.*)?$';
  if((m=s.match(new RegExp(u1,'i'))))return{n:m[1].trim(),a:m[2].trim()};
  var u2='^(\\d+\\.?\\d*(?:\\s*[-~至]\\s*\\d+\\.?\\d*)?\\s*(?:'+_UNITS+'))\\s+(.+)$';
  if((m=s.match(new RegExp(u2,'i'))))return{n:m[2].trim(),a:m[1].trim()};
  if((m=s.match(/^(.+?)\s+(适量|少许|to\s+taste)$/i)))return{n:m[1].trim(),a:m[2].trim()};
  return null;
}

function _parseStep(line){
  var s=line.replace(/^[\s]*[·•\-\*]\s*/,'');
  var m=s.match(/^(\d+)[\.\、\)\]\s：:]\s*(.+)/);
  if(m&&m[2].length>2)return m[2].trim();
  if(_VERBS_RE.test(s)&&s.length>3&&s.length<120)return s;
  return null;
}

function _siPickStrategy(el){

function _siDoImport(){
  var nameIdx={};C.forEach(function(c,i){nameIdx[c.name]=i});
  var allN={};C.forEach(function(c){allN[c.name]=true});
  var added=0,updated=0,skipped=0,renamed=0;
  _siRecipes.forEach(function(r){
    if(!r.name)return;
    if(allN['_b_'+r.name])return;allN['_b_'+r.name]=true;
    if(nameIdx[r.name]!==undefined){
      if(_siStrategy==='skip'){skipped++;return}
      else if(_siStrategy==='rename'){
        var base=r.name,num=2,nn;
        do{nn=base+' ('+num+')';num++}while(allN[nn]);
        r.name=nn;allN[nn]=true;C.push(r);nameIdx[r.name]=C.length-1;renamed++;
      }else{
        r.id=C[nameIdx[r.name]].id;C[nameIdx[r.name]]=r;updated++;
      }
    }else{C.push(r);nameIdx[r.name]=C.length-1;allN[r.name]=true;added++}
  });
  saveCk();refreshAll();
  var ps=[];
  if(added>0)ps.push('新增 '+added+' 款');
  if(updated>0)ps.push('覆盖 '+updated+' 款');
  if(skipped>0)ps.push('跳过 '+skipped+' 款');
  if(renamed>0)ps.push('重命名 '+renamed+' 款');
  showT(ps.length?ps.join('，')+' — 导入完成':'无可导入的新配方');
  _siRecipes=[];
  document.getElementById('siInputArea').style.display='';
  document.getElementById('siPreview').style.display='none';
  document.getElementById('siO').classList.remove('on');
}

function getBaseGroup(baseName) {
  for (var groupName in BASE_GROUPS) {
    var items = BASE_GROUPS[groupName];

      if (baseName === items[i] || baseName.indexOf(items[i]) >= 0 || items[i].indexOf(baseName) >= 0) {
        return groupName;

document.getElementById('wCv').addEventListener('click',function(e){if(wSpin)return;var rect=this.getBoundingClientRect();var x=e.clientX-rect.left,y=e.clientY-rect.top;var cx=rect.width/2,cy=rect.height/2;var dist=Math.sqrt((x-cx)*(x-cx)+(y-cy)*(y-cy));var centerR=(wData.length<=12?30:36)*(rect.width/_wheelSz);if(dist<=centerR)spinW()});
function spinW(){if(wSpin)return;if(wData.length===0){showT('没有匹配的配方');return}if(wData.length===1){document.getElementById('wO').classList.remove('on');shD(wData[0].id);return}wSpin=true;drawW();var n=wData.length,arc=Math.PI*2/n,pick=Math.floor(Math.random()*n);var targetRem=((-(pick+0.5)*arc)%(Math.PI*2)+Math.PI*4)%(Math.PI*2);var curRem=((wRot%(Math.PI*2))+Math.PI*4)%(Math.PI*2);var delta=((targetRem-curRem)%(Math.PI*2)+Math.PI*4)%(Math.PI*2);var total=(8+Math.floor(Math.random()*10))*Math.PI*2+delta,finalRot=wRot+total;var dur=4000+Math.random()*2000,t0=performance.now(),start=wRot;function anim(t){var p=Math.min((t-t0)/dur,1);wRot=start+total*(1-Math.pow(1-p,4));drawW();if(p<1){requestAnimationFrame(anim)}else{wRot=finalRot;drawW();wSpin=false;drawW();document.getElementById('wPtr').classList.add('bounce');setTimeout(function(){document.getElementById('wPtr').classList.remove('bounce')},300);setTimeout(function(){document.getElementById('wO').classList.remove('on');shD(wData[pick].id)},700)}}requestAnimationFrame(anim)}

// ============================================
// GitHub Gist 云同步
// ============================================

var GIST_TOKEN = localStorage.getItem('alchemist_gist_token') || '';
var GIST_ID = localStorage.getItem('alchemist_gist_id') || '';
var GIST_FILENAME = 'alchemist-data.json';
var _gistHooked = false;

function setGistToken(token) {
    GIST_TOKEN = token;
    localStorage.setItem('alchemist_gist_token', token);
}

function buildExportData() {
    return JSON.stringify({
        version: 2,
        timestamp: new Date().toISOString(),
        cocktails: C,
        categories: CATS,
        glasses: GLASSES,
        pantry: PANTRY,
        ingGroups: CUSTOM_GROUPS,
        igDefs: getIGDefs(),
        hiddenIng: getHiddenIng()
    }, null, 2);
}

async function createGist() {
    var res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: {
            'Authorization': 'token ' + GIST_TOKEN,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            description: 'Alchemist Cocktail Data',
            public: false,
            files: {
                [GIST_FILENAME]: { content: buildExportData() }
            }
        })
    });
    var data = await res.json();
    GIST_ID = data.id;
    localStorage.setItem('alchemist_gist_id', GIST_ID);
    showT('Gist 创建成功，数据已同步到云端');
}

async function gistSave() {
    if (!GIST_TOKEN || !GIST_ID) return;
    try {
        await fetch('https://api.github.com/gists/' + GIST_ID, {
            method: 'PATCH',
            headers: {
                'Authorization': 'token ' + GIST_TOKEN,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                files: {
                    [GIST_FILENAME]: { content: buildExportData() }
                }
            })
        });
    } catch (e) {
        console.log('Gist 同步失败', e);
    }
}

async function gistLoad() {
    if (!GIST_TOKEN || !GIST_ID) return false;
    try {
        var res = await fetch('https://api.github.com/gists/' + GIST_ID, {
            headers: { 'Authorization': 'token ' + GIST_TOKEN }
        });
        var data = await res.json();
        var content = data.files[GIST_FILENAME].content;
        var parsed = JSON.parse(content);
        if (parsed.cocktails && parsed.cocktails.length) {
            C = parsed.cocktails;
            if (parsed.categories) CATS = parsed.categories;
            if (parsed.glasses) GLASSES = parsed.glasses;
            if (parsed.pantry) PANTRY = parsed.pantry;
            if (parsed.ingGroups) CUSTOM_GROUPS = parsed.ingGroups;
            saveCk(); saveCt(); saveG(); savePantry(); saveIngGroups();
            refreshAll();
            showT('从云端加载数据成功');
            return true;
        }
    } catch (e) {
        console.log('Gist 加载失败', e);
    }
    return false;
}

var _gistTimer = null;
function debounceGistSave() {
    clearTimeout(_gistTimer);
    _gistTimer = setTimeout(gistSave, 2000);
}

function hookGistSync() {
    if (_gistHooked) return;
    _gistHooked = true;
    var o1 = saveCk; saveCk = function () { o1(); debounceGistSave(); };
    var o2 = saveCt; saveCt = function () { o2(); debounceGistSave(); };
    var o3 = saveG; saveG = function () { o3(); debounceGistSave(); };
    var o4 = savePantry; savePantry = function () { o4(); debounceGistSave(); };
    var o5 = saveIngGroups; saveIngGroups = function () { o5(); debounceGistSave(); };
}

// 设置界面
function openGistSettings() {
    var el = document.getElementById('gistModal');
    if (el) el.remove();
    var div = document.createElement('div');
    div.id = 'gistModal';
    div.className = 'ov on';
    div.innerHTML =
        '<div class="mdl"><div class="mh"><h2>GitHub Gist 云同步</h2>' +
        '<button class="mc" onclick="document.getElementById(\'gistModal\').remove()">&times;</button></div>' +
        '<div class="mb">' +
        '<p style="color:var(--tm);font-size:.86rem;margin-bottom:16px;line-height:1.7">' +
        '通过 GitHub Gist 实现多设备数据同步。数据保存在你的私人 Gist 中，不会公开。</p>' +
        '<div class="fg"><label>GitHub Token</label>' +
        '<input id="gsToken" type="password" value="' + GIST_TOKEN + '" placeholder="粘贴你的 Token" /></div>' +
        '<div class="fg"><label>Gist ID（首次留空自动创建）</label>' +
        '<input id="gsId" value="' + GIST_ID + '" placeholder="首次使用留空即可" /></div>' +
        '<div class="fa">' +
        '<button class="bc" onclick="document.getElementById(\'gistModal\').remove()">取消</button>' +
        '<button class="bs" id="gsSaveBtn">保存并同步</button></div></div></div>';
    document.body.appendChild(div);
    document.getElementById('gsSaveBtn').addEventListener('click', async function () {
        var token = document.getElementById('gsToken').value.trim();
        var id = document.getElementById('gsId').value.trim();
        if (!token) { showT('请输入 Token'); return; }
        setGistToken(token);
        GIST_ID = id;
        localStorage.setItem('alchemist_gist_id', GIST_ID);
        if (!GIST_ID) {
            await createGist();
        } else {
            await gistSave();
            showT('同步成功');
        }
        hookGistSync();
        div.remove();
        updateGistUI();
    });
}

function updateGistUI() {
    var bar = document.getElementById('pfBar');
    var old = document.getElementById('gistBar');
    if (old) old.remove();
    var div = document.createElement('div');
    div.id = 'gistBar';
    div.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);font-family:var(--fm);font-size:.78rem;color:var(--tm)';
    if (GIST_TOKEN && GIST_ID) {
        div.innerHTML =
            '<span style="color:var(--ok)">◉ 已连接云同步</span>' +
            '<button class="pf-edit" onclick="gistLoad()" style="font-size:.7rem">拉取最新</button>' +
            '<button class="pf-edit" onclick="gistSave();showT(\'手动同步完成\')" style="font-size:.7rem">手动推送</button>' +
            '<button class="pf-reset" onclick="openGistSettings()" style="font-size:.7rem">设置</button>';
    } else {
        div.innerHTML =
            '<span style="color:#bf9f4d">○ 未连接云同步</span>' +
            '<button class="pf-edit" onclick="openGistSettings()" style="font-size:.7rem">设置同步</button>';
    }
    bar.parentNode.insertBefore(div, bar);
}

// 启动
async function initGist() {
    if (GIST_TOKEN && GIST_ID) {
        hookGistSync();
        await gistLoad();
    }
    updateGistUI();
}

window.addEventListener('DOMContentLoaded', initGist);
